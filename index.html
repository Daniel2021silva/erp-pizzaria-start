<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Pizzaria Start | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <main class="login-container">
    <section class="login-card">
      <div class="login-brand">
        <span>🍕</span>
        <h1>ERP Pizzaria Start</h1>
        <p>Gestão simples para pizzarias modernas</p>
      </div>

      <form id="loginForm" class="login-form">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" required>

        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>

        <button type="submit">Entrar no sistema</button>

        <small>Usuário: admin | Senha: 1234</small>
      </form>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/backup.js"></script>
</body>
</html>
