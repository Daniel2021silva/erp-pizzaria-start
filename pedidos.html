<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos | ERP Pizzaria Start</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰ Menu</button>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">🍕 ERP Start</div>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="pedidos.html">Pedidos</a>
      <a href="cozinha.html">Cozinha</a>
      <a href="estoque.html">Estoque</a>
      <a href="caixa.html">Caixa</a>
      <a href="clientes.html">Clientes</a>
    </nav>

    <button onclick="sairSistema()" class="logout-btn">Sair</button>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Pedidos</h1>
        <p>Monte pedidos com vários itens</p>
      </div>
    </header>

    <section class="form-panel">
      <h2>Dados do Pedido</h2>

      <form id="pedidoForm" class="erp-form">

        <div class="form-grid">
          <div>
            <label>Cliente</label>
            <input type="text" id="cliente" placeholder="Nome do cliente" required>
          </div>

          <div>
            <label>Telefone</label>
            <input type="text" id="telefone" placeholder="WhatsApp do cliente">
          </div>

          <div>
            <label>Tipo</label>
            <select id="tipo">
              <option value="Balcão">Balcão</option>
              <option value="Retirada">Retirada</option>
              <option value="Entrega">Entrega</option>
            </select>
          </div>

          <div>
            <label>Pagamento</label>
            <select id="pagamento">
              <option value="Pix">Pix</option>
              <option value="Dinheiro">Dinheiro</option>
              <option value="Cartão Débito">Cartão Débito</option>
              <option value="Cartão Crédito">Cartão Crédito</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div>
            <label>Produto</label>
            <input type="text" id="produto" placeholder="Ex: Pizza Calabresa">
          </div>

          <div>
            <label>Quantidade</label>
            <input type="number" id="quantidade" value="1" min="1">
          </div>

          <div>
            <label>Valor Unitário</label>
            <input type="number" id="valor" placeholder="Ex: 65" step="0.01">
          </div>

          <div>
            <label>Ação</label>
            <button type="button" class="secondary-btn" onclick="adicionarItem()">
              Adicionar item
            </button>
          </div>
        </div>

        <div class="cart-panel">
          <h3>Itens do Pedido</h3>
          <div id="listaItensPedido" class="cart-list">
            <p class="empty">Nenhum item adicionado.</p>
          </div>

          <div class="cart-total">
            <span>Total do pedido:</span>
            <strong id="totalPedido">R$ 0,00</strong>
          </div>
        </div>

        <div>
          <label>Observação geral</label>
          <textarea id="observacao" placeholder="Ex: sem cebola, borda cheddar, entregar rápido"></textarea>
        </div>

        <button type="submit" class="primary-btn">Enviar pedido para cozinha</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Pedidos lançados</h2>
      </div>

      <div id="listaPedidos" class="order-list"></div>
    </section>

  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/pedidos.js"></script>
<script src="js/mobile.js"></script>
</body>
</html>
